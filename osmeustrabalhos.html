<script>

let imagens = document.querySelectorAll(".galeria img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");

let indexAtual = 0;

function abrirImagem(img){
    indexAtual = [...imagens].indexOf(img);
    lightbox.style.display="flex";
    lightboxImg.src = img.src;
}

function fecharImagem(){
    lightbox.style.display="none";
}

function proxima(){
    indexAtual++;
    if(indexAtual >= imagens.length) indexAtual = 0;
    lightboxImg.src = imagens[indexAtual].src;
}

function anterior(){
    indexAtual--;
    if(indexAtual < 0) indexAtual = imagens.length-1;
    lightboxImg.src = imagens[indexAtual].src;
}

/* fechar com ESC */
document.addEventListener("keydown", function(e){
    if(e.key==="Escape") fecharImagem();
});

</script>
